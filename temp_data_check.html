<!DOCTYPE html>
<html>
<head>
  <title>Data Check</title>
</head>
<body>
  <h1>Verificando dados de vendas 2025</h1>
  <div id="result">Carregando...</div>
  
  <script>
    async function checkData() {
      try {
        const response = await fetch('/api/data-info/vendas-2025');
        const data = await response.json();
        
        if (data.error) {
          document.getElementById('result').innerHTML = 'Erro: ' + data.error;
          return;
        }
        
        document.getElementById('result').innerHTML = `
          <h2>Informações da Base de Dados - Tabela Vendas 2025</h2>
          <p><strong>Primeiro mês:</strong> ${data.primeiro_mes}</p>
          <p><strong>Último mês:</strong> ${data.ultimo_mes}</p>
          <p><strong>Primeira data completa:</strong> ${data.primeira_data}</p>
          <p><strong>Última data completa:</strong> ${data.ultima_data}</p>
          <p><strong>Total de registros de 2025:</strong> ${data.total_registros.toLocaleString('pt-BR')}</p>
        `;
      } catch (error) {
        document.getElementById('result').innerHTML = 'Erro: ' + error.message;
      }
    }
    
    checkData();
  </script>
</body>
</html>
